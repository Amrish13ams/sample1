<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Focal Jewelry Slider</title>
    <style>
        /* 1. CORE SETUP & THEME (Low Contrast / Analog / Lens Aesthetic) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fafafa;
            min-height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            user-select: none;
            position: relative;
        }

        /* VIBRANT BACKGROUND REFRACTION ORBS (Crucial for testing Glass Lens blur/refraction) */
        .color-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(50px);
            z-index: 1;
            opacity: 0.55;
            pointer-events: none;
        }
        .orb-1 {
            top: -20px;
            left: -20px;
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #2dd4bf 0%, rgba(45, 212, 191, 0) 70%);
        }
        .orb-2 {
            top: -30px;
            right: -20px;
            width: 190px;
            height: 190px;
            background: radial-gradient(circle, #ec4899 0%, rgba(236, 72, 153, 0) 70%);
        }
        .orb-3 {
            bottom: 8%;
            left: -80px;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #3b82f6 0%, rgba(59, 130, 246, 0) 70%);
            opacity: 0.3;
        }

        /* 2. GLASS LENS NAVIGATION BUTTONS */
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: relative;
            z-index: 100;
        }

        /* Unified glass-lens baseline parameters */
        #switchCameraBtn, #menuBtn {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.85) 0%, rgba(255, 255, 255, 0.4) 50%, rgba(245, 245, 245, 0.55) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(85, 85, 85, 0.25);
            color: #444444;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            /* Multi-layered box shadows to simulate depth, inner refraction, and soft outward light diffusion */
            box-shadow: 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.95), 
                inset 0 -1.5px 2px rgba(0, 0, 0, 0.05),
                0 4px 14px rgba(85, 85, 85, 0.1), 
                0 1px 3px rgba(85, 85, 85, 0.05);
        }

        #switchCameraBtn {
            font-weight: 700;
            font-size: 13px;
            padding: 10px 22px;
            border-radius: 9999px; /* Pill profile like an anamorphic glass lens */
            letter-spacing: 0.3px;
        }

        #menuBtn {
            width: 44px;
            height: 44px;
            border-radius: 50%; /* Pure circular camera lens outline */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tactile lens interaction states */
        #switchCameraBtn:hover, #menuBtn:hover {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.5) 50%, rgba(245, 245, 245, 0.65) 100%);
            box-shadow: 
                inset 0 1.5px 3px rgba(255, 255, 255, 1), 
                inset 0 -1.5px 3px rgba(0, 0, 0, 0.08),
                0 8px 20px rgba(85, 85, 85, 0.15), 
                0 2px 5px rgba(85, 85, 85, 0.08);
            transform: translateY(-1.5px);
        }

        #switchCameraBtn:active, #menuBtn:active {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0.3) 50%, rgba(245, 245, 245, 0.45) 100%);
            box-shadow: 
                inset 0 1.5px 3px rgba(0, 0, 0, 0.12), 
                inset 0 -1.5px 2px rgba(255, 255, 255, 0.6),
                0 2px 6px rgba(85, 85, 85, 0.06);
            transform: translateY(1px);
        }

        /* 3. DROPDOWN GLASS MENU */
        .menu-container { position: relative; }

        #dropdownMenu {
            position: absolute;
            top: calc(100% + 12px);
            right: 0;
            width: 160px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9) 0%, rgba(245, 245, 245, 0.75) 100%);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1.5px solid rgba(85, 85, 85, 0.25);
            border-radius: 14px;
            box-shadow: 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.95),
                0 8px 24px rgba(85, 85, 85, 0.12);
            opacity: 0;
            transform: translateY(-10px);
            pointer-events: none;
            overflow: hidden;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 0;
            display: flex;
            flex-direction: column;
            z-index: 110;
        }

        #dropdownMenu.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            max-height: 250px;
        }

        .menu-item {
            background: none;
            border: none;
            border-bottom: 1px solid rgba(85, 85, 85, 0.1);
            color: #555555;
            padding: 13px 18px;
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s ease;
        }

        .menu-item:last-child {
            border-bottom: none;
        }

        .menu-item:hover { 
            background: rgba(85, 85, 85, 0.05); 
            color: #333333;
            padding-left: 22px; /* Soft interactive nudge */
        }

        /* 4. GALLERY WRAPPER (Houses both the fixed viewer and the scrollable list) */
        #galleryWrapper {
            position: fixed;
            right: 25px;
            top: 50%;
            transform: translateY(-50%) translateX(100px); /* Transition layout together */
            width: 110px; /* Aligns perfectly with the 100px wide cards + 5px margins on each side */
            height: 520px; /* Constrained boundary area */
            z-index: 40;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
            opacity: 0;
            pointer-events: none; /* Let background clicks pass through */
        }

        #galleryWrapper.show {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
            pointer-events: auto;
        }

        /* CONSTANT LENS OUTLINE BOX (High-end metallic retention frame design) */
        #focalOutline {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 104px; /* Perfectly wraps a 100px card centered with an exact 2px outline gap on all sides */
            height: 104px;
            border: 2px solid rgba(85, 85, 85, 0.7);
            border-radius: 18px;
            pointer-events: none;
            z-index: 45; /* Sits directly over the passing items */
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.8),
                inset 0 0 0 1.5px rgba(255, 255, 255, 0.4);
        }

        /* Outward micro-focus markings to resemble luxury optical instruments */
        #focalOutline::before {
            content: '';
            position: absolute;
            top: -7px;
            left: -7px;
            right: -7px;
            bottom: -7px;
            border: 1px solid rgba(85, 85, 85, 0.25);
            border-radius: 24px;
            opacity: 0.6;
        }

        /* 5. THE SCROLLABLE VERTICAL GALLERY */
        #necklaceGallery {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            display: flex;
            flex-direction: column;
            align-items: center; /* Enforces absolute horizontal centering for the scrolling cards */
            gap: 20px;
            padding: 210px 0; /* Symmetrical padding so first/last items can reach the center box perfectly */
            scrollbar-width: none;
            scroll-snap-type: y mandatory;
        }

        #necklaceGallery::-webkit-scrollbar { display: none; }

        /* OPTICAL GLASS GALLERY CARDS */
        .gallery-card {
            flex-shrink: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.75) 0%, rgba(255, 255, 255, 0.35) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1.5px solid rgba(85, 85, 85, 0.2);
            border-radius: 18px; /* Smooth curved optical profile */
            box-shadow: 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.9), 
                inset 0 -1.5px 2px rgba(0, 0, 0, 0.04),
                0 4px 12px rgba(85, 85, 85, 0.06);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            scroll-snap-align: center;
            transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
        }

        /* Hover states for interactive magnifier cells */
        .gallery-card:hover {
            border-color: rgba(85, 85, 85, 0.45);
            box-shadow: 
                inset 0 1.5px 3px rgba(255, 255, 255, 1), 
                inset 0 -1.5px 2px rgba(0, 0, 0, 0.06),
                0 6px 16px rgba(85, 85, 85, 0.1);
        }

        .svg-container {
            width: 60%;
            height: 60%;
            margin-bottom: 5px;
        }

        .svg-container svg {
            width: 100%;
            height: 100%;
        }

        .card-name {
            font-size: 8.5px;
            font-weight: 800;
            color: #555555;
            text-transform: uppercase;
            letter-spacing: 0.2px;
        }

        /* 6. MAIN VIEWSPACE */
        main {
            flex: 1;
            background-color: #ffffff;
            position: relative;
            z-index: 10;
        }

        /* 7. GLASSMorphic OPTION SELECT BOTTOM DRAWERS */
        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.12);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #modalOverlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        #optionSelectModal {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translate(-50%, 100%);
            width: 100%;
            max-width: 400px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(250, 250, 250, 0.8) 100%);
            backdrop-filter: blur(24px); /* Heavy optic diffusion */
            -webkit-backdrop-filter: blur(24px);
            border: 2px solid rgba(85, 85, 85, 0.25);
            border-bottom: none;
            border-radius: 24px 24px 0 0;
            box-shadow: 
                inset 0 1.5px 3px rgba(255, 255, 255, 1),
                0 -6px 24px rgba(85, 85, 85, 0.08);
            padding: 24px;
            z-index: 160;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #optionSelectModal.show {
            transform: translate(-50%, 0);
        }

        .modal-title {
            font-size: 15px;
            font-weight: 800;
            color: #444444;
            text-align: center;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .modal-subtitle {
            font-size: 12px;
            color: #777777;
            text-align: center;
            margin-bottom: 22px;
            letter-spacing: 0.3px;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Confirm Glass Lens Button ( Obsidian Core ) */
        .btn-confirm {
            background: linear-gradient(135deg, rgba(85, 85, 85, 0.95) 0%, rgba(55, 55, 55, 0.85) 100%);
            color: #ffffff;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            font-weight: 700;
            font-size: 13.5px;
            padding: 13px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 
                inset 0 1px 1px rgba(255, 255, 255, 0.35),
                0 4px 12px rgba(85, 85, 85, 0.15);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            text-align: center;
        }

        .btn-confirm:hover {
            background: linear-gradient(135deg, rgba(85, 85, 85, 1) 0%, rgba(55, 55, 55, 0.95) 100%);
            transform: translateY(-1px);
            box-shadow: 
                inset 0 1px 2px rgba(255, 255, 255, 0.45),
                0 6px 16px rgba(85, 85, 85, 0.2);
        }

        .btn-confirm:active {
            transform: translateY(1px);
            box-shadow: 
                inset 0 1.5px 3px rgba(0, 0, 0, 0.3),
                0 2px 6px rgba(85, 85, 85, 0.1);
        }

        /* Cancel Glass Lens Button ( Crystal Frosted ) */
        .btn-cancel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0.3) 100%);
            backdrop-filter: blur(4px);
            color: #666666;
            border: 1.5px solid rgba(85, 85, 85, 0.2);
            font-weight: 600;
            font-size: 13px;
            padding: 13px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
            text-align: center;
            box-shadow: inset 0 1.5px 2px rgba(255, 255, 255, 0.8);
        }

        .btn-cancel:hover {
            border-color: rgba(85, 85, 85, 0.45);
            color: #444444;
            transform: translateY(-1px);
        }

        .btn-cancel:active {
            transform: translateY(1px);
        }

        /* 8. BOTTOM-LEFT SELECTION CONTAINER FOR FROSTED CAPSULES */
        #selectionContainer {
            position: fixed;
            left: 20px;
            bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 8px; /* Clean gap spacing between separate rectangular bars */
            z-index: 100;
            pointer-events: none; /* Let backdrop click events pass through */
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            scrollbar-width: none;
        }

        #selectionContainer::-webkit-scrollbar {
            display: none;
        }

        /* INDIVIDUAL STACKED CAPSULE BARS (Frosted Lens Micro-Capsules) */
        .selection-bar-item {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.92) 0%, rgba(255, 255, 255, 0.55) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(85, 85, 85, 0.22);
            color: #444444;
            font-weight: 700;
            font-size: 12.5px;
            padding: 8px 16px;
            border-radius: 9999px; /* Absolute Capsule shape */
            box-shadow: 
                inset 0 1.5px 2px rgba(255, 255, 255, 0.95), 
                inset 0 -1.5px 2px rgba(0, 0, 0, 0.03),
                0 4px 12px rgba(85, 85, 85, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto; /* Active triggers for the individual close buttons */
            animation: slideInBar 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            max-width: 320px;
            word-break: break-word;
        }

        @keyframes slideInBar {
            from {
                transform: translateY(15px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .selection-item-text {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* Glass indicator bead */
        .selection-item-text::before {
            content: '';
            display: inline-block;
            width: 7px;
            height: 7px;
            background: radial-gradient(circle at 35% 35%, #999999 0%, #444444 100%);
            border-radius: 50%;
            flex-shrink: 0;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.8);
        }

        .selection-dismiss-btn {
            background: none;
            border: none;
            color: #999999;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            outline: none;
            padding-left: 2px;
            line-height: 1;
            transition: color 0.15s ease;
        }

        .selection-dismiss-btn:hover {
            color: #444444;
        }
    </style>
</head>

        // Redefined as a no-op function to prevent toast instructions from rendering at the bottom
        function triggerFeedback(msg) {
            /* Empty: toast notifications are disabled */
        }

        // 1. DYNAMIC FOCAL SCALING LOGIC
        function applyFocalScale() {
            const galleryCenter = gallery.getBoundingClientRect().top + (gallery.offsetHeight / 2);
            const cards = gallery.querySelectorAll('.gallery-card');
            
            cards.forEach(card => {
                const cardRect = card.getBoundingClientRect();
                const cardCenter = cardRect.top + (cardRect.height / 2);
                
                // Calculate distance from center (0 to roughly 250)
                const distanceFromCenter = Math.abs(galleryCenter - cardCenter);
                
                /* Scale Logic:
                   - At center (dist 0): Scale 1.0 (Full Size inside fixed outline box)
                   - Above/Below (dist ~120): Scale ~0.8 (Slightly Smaller)
                   - Edge items (dist > 200): Scale ~0.6 (Smallest)
                */
                let scale = 1 - (distanceFromCenter / 450); 
                scale = Math.max(0.6, Math.min(1.0, scale)); // Clamp between 0.6 and 1.0
                
                card.style.transform = `scale(${scale})`;
                card.style.opacity = scale; // Subtly fade edge items
            });
        }

        gallery.addEventListener('scroll', applyFocalScale);

        // Populate cards inside the container dynamically
        function renderCategoryCards(category) {
            const list = jewelryData[category] || [];
            gallery.innerHTML = ""; // Clear existing elements

            list.forEach(item => {
                const card = document.createElement('div');
                card.className = "gallery-card";
                card.onclick = (e) => handleCardSelection(item.name, card);
                
                card.innerHTML = `
                    <div class="svg-container">
                        ${item.svg}
                    </div>
                    <span class="card-name">${item.name}</span>
                `;
                gallery.appendChild(card);
            });
        }

        // 2. INTERACTIVE SELECTION HANDLING
        function handleCardSelection(itemName, cardElement) {
            const galleryCenter = gallery.getBoundingClientRect().top + (gallery.offsetHeight / 2);
            const cardRect = cardElement.getBoundingClientRect();
            const cardCenter = cardRect.top + (cardRect.height / 2);
            
            // Check if the clicked card is precisely in the center viewfinder
            const isCentered = Math.abs(galleryCenter - cardCenter) < 15; 

            if (!isCentered) {
                // If it is NOT centered, scroll it smoothly to snap into the viewfinder
                cardElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                // If it IS centered (highlighted), trigger the bottom option select modal
                openOptionSelect(itemName);
            }
        }

        // Open Bottom Sheet Option Modal
        function openOptionSelect(itemName) {
            selectedItemName = itemName;
            document.getElementById('modalItemName').innerText = selectedItemName;
            document.getElementById('modalItemCategory').innerText = `${activeCategory} Collection`;
            
            modalOverlay.classList.add('show');
            optionSelectModal.classList.add('show');
        }

        // Close Bottom Sheet Option Modal
        function closeOptionSelect() {
            modalOverlay.classList.remove('show');
            optionSelectModal.classList.remove('show');
        }

        // Confirm Item Selection
        function confirmSelection() {
            closeOptionSelect();
            
            if (activeCategory === 'Collections') {
                // If 'Collections' is selected, erase all other items and ONLY keep Collections
                currentSelections = { Collections: selectedItemName };
            } else {
                // If choosing an individual item, erase the active 'Collections' item if present
                delete currentSelections['Collections'];
                
                // Add or alter (overwrite) item under this active category
                currentSelections[activeCategory] = selectedItemName;
            }
            
            updateSelectionDisplay();
        }

        // Re-renders the bottom-left rectangular container with multiple separate bars stacked vertically
        function updateSelectionDisplay() {
            selectionContainer.innerHTML = ""; // Reset container content
            
            const categories = Object.keys(currentSelections);
            if (categories.length === 0) return;
            
            // Render each active selection as its own clean rectangular bar
            categories.forEach(cat => {
                const itemBar = document.createElement('div');
                itemBar.className = "selection-bar-item";
                
                // Selection description
                const textSpan = document.createElement('span');
                textSpan.className = "selection-item-text";
                textSpan.innerText = `${cat}: ${currentSelections[cat]}`;
                
                // Individual dismiss button
                const dismissBtn = document.createElement('button');
                dismissBtn.className = "selection-dismiss-btn";
                dismissBtn.innerHTML = "&times;";
                dismissBtn.title = `Clear ${cat}`;
                dismissBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteSingleSelection(cat);
                };
                
                itemBar.appendChild(textSpan);
                itemBar.appendChild(dismissBtn);
                selectionContainer.appendChild(itemBar); // Appends to bottom of the stacked group
            });
        }

        // Clear a single selection bar independently
        function deleteSingleSelection(cat) {
            delete currentSelections[cat];
            updateSelectionDisplay();
        }

        // 3. INTERFACE CONTROLS
        function toggleDropdown() {
            const dropdown = document.getElementById('dropdownMenu');
            
            // If the focal gallery wrapper is currently showing, retract it immediately
            if (wrapper.classList.contains('show')) {
                wrapper.classList.remove('show');
                dropdown.classList.remove('show');
            } else {
                // Otherwise, normal behavior: toggle dropdown options
                dropdown.classList.toggle('show');
            }
        }

        // Close dropdown when clicking outside (on the main screen)
        function closeDropdown() {
            document.getElementById('dropdownMenu').classList.remove('show');
        }

        // Opens catalog view for a selected category
        function selectCategory(cat) {
            activeCategory = cat;
            renderCategoryCards(cat);
            
            // Slide in the wrapper and trigger the scaling update
            wrapper.classList.add('show');
            setTimeout(() => {
                applyFocalScale();
                gallery.scrollTop = 0; // Reset scroll position to top
            }, 50);

            closeDropdown();
        }
    </script>
